name: Ask Pullbot

on:
  workflow_dispatch:
    inputs:
      question:
        description: 'Your question'
        required: true

jobs:
  ask:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      actions: write
    steps:
    - name: Trigger responder
      run: |
        curl -s -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${{ github.repository }}/actions/workflows/respond.yml/dispatches" \
          -d "{\"ref\":\"main\",\"inputs\":{\"question\":\"${{ github.event.inputs.question }}\"}}"
