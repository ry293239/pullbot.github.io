name: Run Benchmark

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Train Pullbot"]
    types: [completed]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: pip install requests
    - name: Run benchmark
      run: python src/benchmark.py
    - name: Push scores
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        git add data/benchmark_scores.json
        git diff --staged --quiet || git commit -m "📊 Benchmark scores updated" && git push || echo "No changes"
