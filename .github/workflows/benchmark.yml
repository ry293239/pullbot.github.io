name: Run Benchmark

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Train Pullbot"]
    types: [completed]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: pip install requests
    - name: Run benchmark
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python src/benchmark.py
    - name: Push scores
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        git add data/benchmark_scores.json
        if git diff --staged --quiet; then
          echo "No changes"
        else
          git commit -m "📊 Benchmark scores updated"
          git push origin main
          echo "Pushed!"
        fi
