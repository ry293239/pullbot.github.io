name: Cleanup Repo

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - uses: actions/checkout@v4
      
    - name: 🧹 Remove trash files only
      run: |
        echo "Cleaning up trash files..."
        
        # ========== DELETE: Quadratic CSV exports (479 files, ~2GB) ==========
        echo "Removing quadratic CSV files..."
        rm -rf data/quadratic/
        rm -rf data/weights/ 2>/dev/null || true
        
        # ========== DELETE: Temp directories ==========
        echo "Removing temp directories..."
        rm -rf models/temp_*/
        rm -rf models/temp_trained/ 2>/dev/null || true
        rm -rf models/temp_quick/ 2>/dev/null || true
        rm -rf models/temp_test/ 2>/dev/null || true
        
        # ========== DELETE: Old checkpoints ==========
        echo "Removing old checkpoints..."
        rm -rf models/checkpoints/
        
        # ========== DELETE: Old scrape dumps (keep latest 3) ==========
        echo "Cleaning old scrape dumps..."
        if [ -d data/raw ]; then
          cd data/raw
          ls -t scrape_*.json 2>/dev/null | tail -n +4 | xargs rm -f 2>/dev/null || true
          cd ../..
        fi
        
        # ========== DELETE: Micro facts (experimental) ==========
        rm -rf data/micro/
        
        # ========== DELETE: Python cache ==========
        echo "Removing Python cache..."
        find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
        find . -type f -name "*.pyc" -delete 2>/dev/null || true
        find . -type f -name ".DS_Store" -delete 2>/dev/null || true
        
        # ========== DELETE: Old ONNX/binary exports ==========
        rm -f models/pullbot.onnx 2>/dev/null || true
        rm -f models/pullbot.bin 2>/dev/null || true
        
        # ========== KEEP EVERYTHING ELSE ==========
        # ✅ models/chunks/ (latest trained model)
        # ✅ models/last_train.json
        # ✅ data/processed/corpus.txt
        # ✅ data/knowledge/version.json
        # ✅ knowledge/store.json
        # ✅ src/ (all Python logic)
        # ✅ .github/workflows/ (all CI/CD)
        # ✅ index.html, config.yaml, requirements.txt
        # ✅ render/ (API files)
        # ✅ js/ (website scripts)
        
        echo ""
        echo "✅ Cleanup complete!"
        echo ""
        echo "📊 Remaining files:"
        du -sh models/chunks/ 2>/dev/null || echo "  no chunks"
        du -sh data/ 2>/dev/null || echo "  no data"
        du -sh knowledge/ 2>/dev/null || echo "  no knowledge"
        du -sh src/ 2>/dev/null || echo "  no src"
        du -sh render/ 2>/dev/null || echo "  no render"
        du -sh .github/ 2>/dev/null || echo "  no workflows"
        du -sh js/ 2>/dev/null || echo "  no js"
        echo "---"
        du -sh . 2>/dev/null
        
    - name: 💾 Commit cleanup
      run: |
        git config user.name "Pullbot-ai"
        git config user.email "ry2012293239@gmail.com"
        git add -A
        if git diff --staged --quiet; then
          echo "Nothing to clean"
        else
          git commit -m "🧹 Cleanup: removed 479 quadratic CSV files + temps + caches"
          git push
          echo "✅ Cleanup pushed"
        fi
