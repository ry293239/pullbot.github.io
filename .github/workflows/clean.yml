name: Force Clean Knowledge

on:
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - uses: actions/checkout@v4
      
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install deps
      run: pip install torch transformers numpy pyyaml
      
    - name: Clean corpus aggressively
      run: |
        python -c "
        import re, os
        path = 'data/processed/corpus.txt'
        if os.path.exists(path):
            with open(path, 'r') as f:
                text = f.read()
            
            before = len(text)
            
            # Nuclear cleaning
            text = re.sub(r'<[^>]+>', '', text)
            text = re.sub(r'https?://\S+', '', text)
            text = re.sub(r'!\[.*?\]\(.*?\)', '', text)
            text = re.sub(r'\[!\[.*?\]\(.*?\)\]\(.*?\)', '', text)
            text = re.sub(r'\[([^\]]+)\]\([^)]+\)', r'\1', text)
            text = re.sub(r'`[^`]+`', '', text)
            text = re.sub(r'#[^\n]*', '', text)
            text = re.sub(r'\n{3,}', '\n\n', text)
            text = re.sub(r'[=\-*]{3,}', '', text)
            text = re.sub(r'\|[^|]+\|', '', text)
            text = re.sub(r'badge|shield|svg|build|status|coverage|discord|chat|join|releases|linux|macos|windows', '', text, flags=re.IGNORECASE)
            text = re.sub(r'\n\s*\n\s*\n', '\n\n', text)
            
            # Remove lines shorter than 30 chars (badges, fragments)
            lines = [l for l in text.split('\n') if len(l.strip()) > 30 or l.strip() == '---']
            text = '\n'.join(lines)
            
            with open(path, 'w') as f:
                f.write(text)
            
            after = len(text)
            print(f'Cleaned: {before:,} -> {after:,} chars ({((1-after/before)*100):.0f}% removed)')
        "
      
    - name: Wipe and rebuild knowledge
      run: |
        echo "[]" > knowledge/store.json
        python src/store.py build
      
    - name: Show sample knowledge
      run: |
        python -c "
        import json
        with open('knowledge/store.json') as f:
            data = json.load(f)
        print(f'Knowledge chunks: {len(data)}')
        print('\n--- First 3 chunks ---')
        for i, chunk in enumerate(data[:3]):
            print(f'\n{i+1}. {chunk[\"text\"][:200]}...')
        "
      
    - name: Push
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        git add knowledge/ data/processed/
        git commit -m "Nuclear clean: removed all markdown junk from knowledge" || echo "No changes"
        git push
