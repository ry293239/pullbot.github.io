name: Export GGUF Model

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: |
        pip install torch transformers numpy safetensors sentencepiece
        git clone --depth 1 https://github.com/ggerganov/llama.cpp
        pip install -r llama.cpp/requirements.txt
    - name: Reassemble model
      run: |
        python -c "
        import os, json
        
        chunks_dir = 'models/chunks'
        with open(f'{chunks_dir}/manifest.json') as f:
            manifest = json.load(f)
        
        weights_file = manifest.get('weights_filename', 'model.safetensors')
        reassembled = f'{chunks_dir}/{weights_file}'
        
        if not os.path.exists(reassembled):
            print(f'Reassembling {weights_file} from {manifest[\"num_chunks\"]} chunks...')
            with open(reassembled, 'wb') as out:
                for chunk_path in manifest['chunks']:
                    with open(chunk_path, 'rb') as inc:
                        out.write(inc.read())
            print(f'Done: {os.path.getsize(reassembled)/(1024*1024):.1f}MB')
        else:
            print(f'Already reassembled: {os.path.getsize(reassembled)/(1024*1024):.1f}MB')
        
        # Copy config files
        import shutil
        for cfg in ['config.json', 'tokenizer_config.json', 'vocab.json', 'merges.txt', 'tokenizer.json']:
            src = f'{chunks_dir}/{cfg}'
            if os.path.exists(src):
                shutil.copy(src, f'models/{cfg}')
        "
    - name: Convert to GGUF
      run: |
        python llama.cpp/convert_hf_to_gguf.py models/ \
          --outfile models/pullbot.gguf \
          --outtype q4_k_m 2>&1 || echo "Trying alternative..."
        
        if [ ! -f models/pullbot.gguf ]; then
          echo "First attempt failed, trying with model name..."
          python llama.cpp/convert_hf_to_gguf.py models/ \
            --outfile models/pullbot.gguf \
            --outtype f16 2>&1 || true
        fi
        
        if [ -f models/pullbot.gguf ]; then
          echo "✅ GGUF created: $(du -h models/pullbot.gguf | cut -f1)"
        else
          echo "❌ Conversion failed"
          echo "Files in models/:"
          ls -la models/
        fi
        
    - name: Push GGUF model
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        if [ -f models/pullbot.gguf ]; then
          git add models/pullbot.gguf
          git commit -m "📤 Exported GGUF model" && git push || echo "No changes"
        else
          echo "No GGUF file to push"
        fi
