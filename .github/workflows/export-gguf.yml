name: Export GGUF

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: pip install torch transformers safetensors sentencepiece gguf
    - name: Reassemble and convert
      run: |
        python -c "
        import os, json, torch, shutil
        from transformers import AutoModelForCausalLM, AutoTokenizer
        
        cd = 'models/chunks'
        with open(f'{cd}/manifest.json') as f:
            m = json.load(f)
        wf = m['weights_filename']
        if not os.path.exists(f'{cd}/{wf}'):
            with open(f'{cd}/{wf}', 'wb') as out:
                for cp in m['chunks']:
                    with open(cp, 'rb') as inc:
                        out.write(inc.read())
        
        os.makedirs('models_clean', exist_ok=True)
        tok = AutoTokenizer.from_pretrained(cd)
        tok.save_pretrained('models_clean')
        model = AutoModelForCausalLM.from_pretrained(cd, torch_dtype=torch.float32, low_cpu_mem_usage=True)
        model.save_pretrained('models_clean')
        
        import subprocess
        r = subprocess.run(['python', 'llama.cpp/convert_hf_to_gguf.py', 'models_clean/', '--outfile', 'models/pullbot.gguf', '--outtype', 'q8_0'], capture_output=True, text=True)
        if r.returncode != 0:
            r = subprocess.run(['python', 'llama.cpp/convert_hf_to_gguf.py', 'models_clean/', '--outfile', 'models/pullbot.gguf', '--outtype', 'f16'], capture_output=True, text=True)
        shutil.rmtree('models_clean')
        print(f'GGUF: {os.path.getsize(\"models/pullbot.gguf\")/(1024*1024):.0f}MB' if os.path.exists('models/pullbot.gguf') else 'Failed')
        "
    - name: Push GGUF
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        git add models/pullbot.gguf
        git diff --staged --quiet || git commit -m "📤 GGUF exported" && git push || echo "No changes"
