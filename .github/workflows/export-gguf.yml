name: Export GGUF Model

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: |
        pip install torch transformers numpy safetensors sentencepiece
        git clone --depth 1 https://github.com/ggerganov/llama.cpp
        pip install -r llama.cpp/requirements.txt
    - name: Load and save clean FP32 model
      run: |
        python -c "
        import os, json, torch
        from transformers import AutoModelForCausalLM, AutoTokenizer, AutoConfig
        
        chunks_dir = 'models/chunks'
        
        # Reassemble
        with open(f'{chunks_dir}/manifest.json') as f:
            manifest = json.load(f)
        weights_file = manifest.get('weights_filename', 'pytorch_model.bin')
        reassembled = f'{chunks_dir}/{weights_file}'
        if not os.path.exists(reassembled):
            with open(reassembled, 'wb') as out:
                for chunk_path in manifest['chunks']:
                    with open(chunk_path, 'rb') as inc:
                        out.write(inc.read())
        
        # Load with config only (skip quantized weights)
        print('Loading config...')
        config = AutoConfig.from_pretrained(chunks_dir)
        model = AutoModelForCausalLM.from_config(config)
        
        # Load state dict manually, skip quantized params
        print('Loading weights...')
        state_dict = torch.load(reassembled, map_location='cpu')
        clean_dict = {}
        for k, v in state_dict.items():
            if not isinstance(v, tuple) and v.dtype != torch.qint8:
                clean_dict[k] = v.float()
        
        model.load_state_dict(clean_dict, strict=False)
        
        # Save as clean FP32
        os.makedirs('models_clean', exist_ok=True)
        model.save_pretrained('models_clean')
        
        tokenizer = AutoTokenizer.from_pretrained(chunks_dir)
        tokenizer.save_pretrained('models_clean')
        
        print(f'Saved clean model to models_clean/')
        print(f'Files: {os.listdir(\"models_clean\")}')
        "
    - name: Convert to GGUF
      run: |
        python llama.cpp/convert_hf_to_gguf.py models_clean/ --outfile models/pullbot.gguf --outtype q8_0 2>&1
        
        if [ ! -f models/pullbot.gguf ]; then
          echo "Trying f16..."
          python llama.cpp/convert_hf_to_gguf.py models_clean/ --outfile models/pullbot.gguf --outtype f16 2>&1
        fi
        
        if [ -f models/pullbot.gguf ]; then
          echo "GGUF: $(du -h models/pullbot.gguf | cut -f1)"
        else
          echo "Conversion failed"
        fi
        
    - name: Push GGUF model
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        if [ -f models/pullbot.gguf ]; then
          git add models/pullbot.gguf
          git commit -m "📤 Exported GGUF model" && git push || echo "No changes"
        fi
