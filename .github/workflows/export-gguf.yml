name: Export GGUF Model

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: pip install torch transformers numpy safetensors sentencepiece
    - name: Convert to GGUF
      run: |
        # Clone llama.cpp for conversion script
        git clone --depth 1 https://github.com/ggerganov/llama.cpp
        pip install -r llama.cpp/requirements.txt
        
        python -c "
        import os, json, torch
        from transformers import AutoModelForCausalLM, AutoTokenizer
        
        chunks_dir = 'models/chunks'
        
        # Reassemble
        with open(f'{chunks_dir}/manifest.json') as f:
            manifest = json.load(f)
        weights_file = manifest.get('weights_filename', 'model.safetensors')
        reassembled = f'{chunks_dir}/{weights_file}'
        if not os.path.exists(reassembled):
            with open(reassembled, 'wb') as out:
                for chunk_path in manifest['chunks']:
                    with open(chunk_path, 'rb') as inc:
                        out.write(inc.read())
        
        # Save as single pytorch bin for conversion
        print('Loading model...')
        model = AutoModelForCausalLM.from_pretrained(chunks_dir, torch_dtype=torch.float32, low_cpu_mem_usage=True)
        print('Saving as single file...')
        torch.save(model.state_dict(), 'models/pytorch_model.bin')
        print('Saved pytorch_model.bin')
        "
        
        # Convert to GGUF
        python llama.cpp/convert_hf_to_gguf.py models/ --outfile models/pullbot.gguf --outtype q4_k_m || echo "Trying alternative..."
        
        if [ ! -f models/pullbot.gguf ]; then
          python llama.cpp/convert.py models/ --outfile models/pullbot.gguf --outtype q4_k_m || true
        fi
        
        if [ -f models/pullbot.gguf ]; then
          echo "GGUF created: $(du -h models/pullbot.gguf | cut -f1)"
        else
          echo "GGUF conversion failed, files in models/:"
          ls -la models/
        fi
        
    - name: Push GGUF model
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        if [ -f models/pullbot.gguf ]; then
          git add models/pullbot.gguf
          git commit -m "📤 Exported GGUF model" && git push || echo "No changes"
        else
          echo "No GGUF file to push"
        fi
