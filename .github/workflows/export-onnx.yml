name: Export ONNX Model

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: pip install torch transformers datasets onnx numpy accelerate safetensors pyyaml
    - name: Export ONNX
      run: python src/model.py onnx
    - name: Push ONNX model
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        git add models/pullbot.onnx
        git diff --staged --quiet || git commit -m "📤 Exported ONNX model"
        git push
