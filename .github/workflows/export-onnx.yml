name: Export ONNX Model

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: pip install torch transformers onnx onnxscript numpy safetensors
    - name: Reassemble and Export ONNX
      run: |
        python -c "
        import os, json, torch
        from transformers import AutoModelForCausalLM, AutoTokenizer
        
        chunks_dir = 'models/chunks'
        
        with open(f'{chunks_dir}/manifest.json') as f:
            manifest = json.load(f)
        
        weights_file = manifest.get('weights_filename', 'model.safetensors')
        reassembled = f'{chunks_dir}/{weights_file}'
        
        if not os.path.exists(reassembled) or os.path.getsize(reassembled) != manifest['total_size']:
            print(f'Reassembling from {manifest[\"num_chunks\"]} chunks...')
            with open(reassembled, 'wb') as out:
                for chunk_path in manifest['chunks']:
                    with open(chunk_path, 'rb') as inc:
                        out.write(inc.read())
            print('Reassembled')
        
        print('Loading model...')
        tokenizer = AutoTokenizer.from_pretrained(chunks_dir)
        tokenizer.pad_token = tokenizer.eos_token
        model = AutoModelForCausalLM.from_pretrained(chunks_dir, torch_dtype=torch.float32, low_cpu_mem_usage=True)
        model.eval()
        model.to('cpu')
        
        print('Exporting ONNX...')
        dummy_input = torch.randint(0, 50257, (1, 64))
        dummy_mask = torch.ones(1, 64, dtype=torch.int64)
        
        torch.onnx.export(
            model, (dummy_input, dummy_mask),
            'models/pullbot.onnx',
            input_names=['input_ids', 'attention_mask'],
            output_names=['logits'],
            dynamic_axes={
                'input_ids': {0: 'batch', 1: 'sequence'},
                'attention_mask': {0: 'batch', 1: 'sequence'},
                'logits': {0: 'batch', 1: 'sequence'}
            },
            opset_version=14, do_constant_folding=True
        )
        
        size_mb = os.path.getsize('models/pullbot.onnx') / (1024*1024)
        print(f'ONNX model: {size_mb:.1f}MB')
        "
    - name: Push ONNX model
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        if [ -f models/pullbot.onnx ]; then
          git add models/pullbot.onnx
          git commit -m "📤 Exported ONNX model" && git push || echo "No changes"
        else
          echo "ONNX file not found!"
          exit 1
        fi
