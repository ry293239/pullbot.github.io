name: Mass Scrape Ping

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Mass Scrape Wikipedia"]
    types: [completed]

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wait and trigger
        run: |
          echo "Mass scrape done. Resting 15s..."
          sleep 15
          echo "Ping! Next scrape ready."
