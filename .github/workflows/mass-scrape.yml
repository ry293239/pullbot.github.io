name: Mass Scrape Wikipedia

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Mass Scrape Ping"]
    types: [completed]

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: pip install requests
    - name: Fix corrupted files
      run: python src/fix_wordbank.py
    - name: Mass scrape
      run: python src/mass_scrape_wikipedia.py 50
    - name: Define words
      run: python src/define_words.py 100
    - name: Rich training data
      run: python src/rich_scraper.py
    - name: Smart training
      run: python src/smart_train.py
    - name: Roll large files
      run: |
        if [ -f data/wordbank.json ]; then
          SIZE=$(wc -c < data/wordbank.json)
          if [ "$SIZE" -gt 50000000 ]; then
            TIMESTAMP=$(date +%s)
            mv data/wordbank.json "data/wordbank_v${TIMESTAMP}.json"
            python -c "import json; json.dump({'words':{},'total_articles':0,'total_words':0,'total_defined':0}, open('data/wordbank.json','w'))"
            echo "Wordbank rolled"
          fi
        fi
        if [ -f data/processed/corpus.txt ]; then
          SIZE=$(wc -c < data/processed/corpus.txt)
          if [ "$SIZE" -gt 80000000 ]; then
            TIMESTAMP=$(date +%s)
            mv data/processed/corpus.txt "data/processed/corpus_v${TIMESTAMP}.txt"
            echo "" > data/processed/corpus.txt
            echo "Corpus rolled"
          fi
        fi
    - name: Push
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        git stash
        git pull --rebase origin main
        git stash pop || true
        git add data/wordbank.json data/processed/corpus.txt
        git diff --staged --quiet || git commit -m "📚 Mass scrape: +words +training"
        git push origin main
    - name: Trigger Mass Scrape Ping
      if: always()
      run: |
        curl -s -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${{ github.repository }}/actions/workflows/mass-scrape-ping.yml/dispatches" \
          -d '{"ref":"main"}'
