name: Optimize Model

on:
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
      
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: pip install torch transformers datasets accelerate safetensors numpy
        
    - name: ✂️ Prune + Quantize
      run: python src/model.py optimize 0.9
      
    - name: 📤 Export for Quadratic
      run: python src/export_to_quadratic.py
      
    - name: 🗑 Remove large files
      run: |
        rm -rf models/checkpoints/
        rm -rf models/temp_trained/
        rm -f models/chunks/model.safetensors
        rm -f models/chunks/pytorch_model.bin
        
    - name: 💾 Commit & push (with retry)
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        
        git add models/chunks/
        git add data/quadratic/
        git add data/knowledge/
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "✂️ Optimized: pruned + quantized + exported to Quadratic"
          
          for i in 1 2 3; do
            echo "Push attempt $i..."
            git pull --rebase && git push && break
            echo "Retrying in 5s..."
            sleep 5
          done
        fi
