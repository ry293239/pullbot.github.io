name: Optimize Model

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Ping Pullbot"]
    types: [completed]

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: pip install torch transformers datasets accelerate safetensors numpy pyyaml
    - name: Run optimization
      run: python src/optimize_pipeline.py
    - name: Remove large files
      run: |
        rm -rf models/checkpoints/
        rm -rf models/temp_trained/
        rm -f models/chunks/model.safetensors
        rm -f models/chunks/pytorch_model.bin
    - name: Push
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        git stash
        git pull --rebase origin main
        git stash pop || true
        git add models/chunks/ models/last_train.json 2>/dev/null || true
        git diff --staged --quiet || git commit -m "✂️ Full optimization complete" && git push origin main || echo "No changes"
