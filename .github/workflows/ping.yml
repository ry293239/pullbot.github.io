name: Ping Pullbot

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Train Pullbot"]
    types: [completed]

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
    - name: Wait then trigger training
      run: |
        echo "⏳ Pullbot resting for 15 seconds..."
        sleep 15
        echo "🏓 Ping! Triggering next training round."
    - name: Delete quadratic junk
      run: |
        rm -rf data/quadratic/
        rm -f src/export_to_quadratic.py
        echo "Deleted quadratic files and exporter"
