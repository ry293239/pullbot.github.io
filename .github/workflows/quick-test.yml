name: Quick Train

on:
  workflow_dispatch:

jobs:
  quick-train:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Resolve conflicts
      run: |
        echo "===== RESOLVING CONFLICTS ====="
        git checkout --ours data/processed/corpus.txt 2>/dev/null || true
        git checkout --ours knowledge/store.json 2>/dev/null || true
        git checkout --ours data/knowledge/version.json 2>/dev/null || true
        git add -A
        git diff --staged --quiet || git commit -m "Auto-resolve conflicts" || true
        echo "Conflicts resolved"
        
    - name: Install dependencies
      run: |
        echo "===== INSTALLING DEPS ====="
        pip install --upgrade pip
        pip install torch transformers datasets accelerate requests beautifulsoup4 numpy pyyaml safetensors
        echo "Dependencies installed"
        
    - name: Scrape fresh data
      timeout-minutes: 5
      run: |
        echo "===== SCRAPING ====="
        python src/scrape.py
        echo "Scraping complete"
      
    - name: Clean corpus
      run: |
        echo "===== CLEANING CORPUS ====="
        python src/clean_corpus.py
        echo "Cleaning complete"
      
    - name: Rich training data
      run: |
        echo "===== RICH TRAINING DATA ====="
        python src/rich_scraper.py
        echo "Rich data complete"
      
    - name: Smart training
      run: |
        echo "===== SMART TRAINING ====="
        python src/smart_train.py
        echo "Smart training complete"
      
    - name: Generate synthetic Q&A (GitHub Models)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "===== SYNTHETIC Q&A ====="
        python src/generate_synthetic_qa.py gpt-4o 2>/dev/null || echo "Synthetic Q&A skipped (no token or API unavailable)"
        echo "Synthetic Q&A complete"
      
    - name: Build clean knowledge
      timeout-minutes: 10
      run: |
        echo "===== BUILDING KNOWLEDGE ====="
        python src/store.py build
        echo "Knowledge build complete"
      
    - name: Quick train model
      timeout-minutes: 25
      run: |
        echo "===== TRAINING START ====="
        echo "Time: $(date)"
        
        if [ -f data/processed/corpus.txt ]; then
          CORPUS_SIZE=$(wc -c < data/processed/corpus.txt)
          echo "Corpus size: $CORPUS_SIZE chars"
          
          if [ "$CORPUS_SIZE" -gt 500 ]; then
            echo "Starting training..."
            python src/model.py train 2>&1 | while IFS= read -r line; do
              echo "  [TRAIN] $line"
            done
            TRAIN_EXIT=${PIPESTATUS[0]}
            echo "Training exit code: $TRAIN_EXIT"
            
            if [ $TRAIN_EXIT -eq 0 ]; then
              echo "TRAINED=true" >> $GITHUB_ENV
              echo "===== TRAINING COMPLETE ====="
            else
              echo "Training failed with code $TRAIN_EXIT"
              echo "TRAINED=false" >> $GITHUB_ENV
            fi
          else
            echo "ERROR: Corpus too small (need >500, got $CORPUS_SIZE)"
            echo "TRAINED=false" >> $GITHUB_ENV
          fi
        else
          echo "ERROR: No corpus file found!"
          echo "TRAINED=false" >> $GITHUB_ENV
        fi
      
    - name: Update version
      run: |
        echo "===== UPDATING VERSION ====="
        mkdir -p data/knowledge
        CHUNKS=0; CORPUS_KB=0
        if [ -f knowledge/store.json ]; then
          python -c "import json; json.load(open('knowledge/store.json'))" 2>/dev/null && CHUNKS=$(python -c "import json; print(len(json.load(open('knowledge/store.json'))))") || CHUNKS=0
        fi
        if [ -f data/processed/corpus.txt ]; then
          CORPUS_KB=$(( $(wc -c < data/processed/corpus.txt) / 1024 ))
        fi
        cat > data/knowledge/version.json << ENDJSON
        {
          "version": "2.0-quick",
          "updated": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
          "knowledge_chunks": ${CHUNKS},
          "corpus_kb": ${CORPUS_KB},
          "model_trained": $( [ "$TRAINED" = "true" ] && echo "true" || echo "false" ),
          "training_type": "quick_train"
        }
        ENDJSON
        echo "Version: 2.0-quick | Chunks: ${CHUNKS} | Corpus: ${CORPUS_KB}KB | Trained: ${TRAINED:-false}"
        
    - name: Remove large files
      run: |
        rm -rf models/checkpoints/
        rm -rf models/temp_trained/
        rm -f models/chunks/model.safetensors
        rm -f models/chunks/pytorch_model.bin
        echo "Large files removed"
        
    - name: Commit and push
      run: |
        echo "===== COMMITTING ====="
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        git checkout --ours data/processed/corpus.txt 2>/dev/null || true
        git checkout --ours knowledge/store.json 2>/dev/null || true
        git stash
        git pull --rebase origin main
        git stash pop || true
        git add data/ knowledge/ models/chunks/ models/last_train.json 2>/dev/null || true
        git add src/ config.yaml .github/ 2>/dev/null || true
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "⚡ Quick train: $(date -u +'%H:%M UTC') | ${CHUNKS} chunks | ${CORPUS_KB}KB"
          git push origin main
          echo "Pushed!"
        fi
