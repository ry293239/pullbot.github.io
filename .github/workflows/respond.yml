name: Respond

on:
  workflow_dispatch:
    inputs:
      question:
        description: 'Question'
        required: true

jobs:
  respond:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-llama
    - name: Install deps
      run: pip install llama-cpp-python requests beautifulsoup4
    - name: Reassemble model
      run: |
        python -c "
        import json, os
        cd = 'models/chunks'
        with open(f'{cd}/manifest.json') as f:
            m = json.load(f)
        wf = m['weights_filename']
        if not os.path.exists(f'{cd}/{wf}'):
            with open(f'{cd}/{wf}', 'wb') as out:
                for cp in m['chunks']:
                    with open(cp, 'rb') as inc:
                        out.write(inc.read())
        "
    - name: Search web and generate
      run: |
        python -c "
        from llama_cpp import Llama
        import json, time, os, glob, requests, re
        
        question = '''${{ github.event.inputs.question }}'''
        
        # Search Wikipedia for context
        context = ''
        try:
            search_url = f'https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch={question}&format=json'
            r = requests.get(search_url, timeout=10)
            if r.status_code == 200:
                results = r.json().get('query', {}).get('search', [])
                if results:
                    # Get first result summary
                    page_id = results[0]['pageid']
                    summary_url = f'https://en.wikipedia.org/w/api.php?action=query&prop=extracts&exintro=true&explaintext=true&pageids={page_id}&format=json'
                    sr = requests.get(summary_url, timeout=10)
                    if sr.status_code == 200:
                        pages = sr.json().get('query', {}).get('pages', {})
                        for p in pages.values():
                            context = p.get('extract', '')[:500]
                            break
            if context:
                print(f'Found context: {len(context)} chars')
        except Exception as e:
            print(f'Search skipped: {e}')
        
        # Load model
        cd = 'models/chunks'
        with open(f'{cd}/manifest.json') as f:
            m = json.load(f)
        model_path = f'{cd}/{m[\"weights_filename\"]}'
        
        llm = Llama(model_path=model_path, n_ctx=256, n_threads=2, verbose=False)
        
        # Generate with context
        if context:
            prompt = f'Context: {context}\n\nQuestion: {question}\n\nAnswer:'
        else:
            prompt = f'Question: {question}\n\nAnswer:'
        
        out = llm(prompt, max_tokens=80, temperature=0.8)
        resp = out['choices'][0]['text'].strip()
        
        result = {
            'question': question,
            'response': resp,
            'searched': bool(context),
            'time': time.time()
        }
        with open('response.json','w') as f:
            json.dump(result, f)
        print(f'Response: {resp[:200]}')
        "
    - name: Push response
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        git add response.json
        if git diff --staged --quiet; then
          echo "No changes"
        else
          git commit -m "💬 Response (web search)"
          git push origin main
          echo "Pushed!"
        fi
