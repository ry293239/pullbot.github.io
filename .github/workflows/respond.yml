name: Respond

on:
  workflow_dispatch:
    inputs:
      question:
        description: 'Question'
        required: true

jobs:
  respond:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-llama
    - name: Install deps
      run: pip install llama-cpp-python
    - name: Reassemble model from chunks
      run: |
        python -c "
        import json, os
        with open('models/chunks/manifest.json') as f:
            manifest = json.load(f)
        wf = manifest['weights_filename']
        if not os.path.exists(f'models/chunks/{wf}'):
            print(f'Reassembling {wf}...')
            with open(f'models/chunks/{wf}', 'wb') as out:
                for cp in manifest['chunks']:
                    with open(cp, 'rb') as inc:
                        out.write(inc.read())
            print('Done')
        "
    - name: Generate response
      run: |
        python -c "
        from llama_cpp import Llama
        import json, time
        llm = Llama(model_path='models/chunks/pytorch_model.bin', n_ctx=256, n_threads=2, verbose=False)
        q = '''${{ github.event.inputs.question }}'''
        out = llm(f'Question: {q}\n\nAnswer:', max_tokens=60, temperature=0.8)
        resp = out['choices'][0]['text'].strip()
        with open('response.json','w') as f:
            json.dump({'question':q,'response':resp,'time':time.time()}, f)
        print(resp)
        "
    - name: Push response
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        git add response.json
        git diff --staged --quiet || git commit -m "💬 Response" && git push || echo "No changes"
