name: Respond

on:
  workflow_dispatch:
    inputs:
      question:
        description: 'Question'
        required: true

jobs:
  respond:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-llama
    - name: Install deps
      run: pip install llama-cpp-python
    - name: Reassemble model
      run: |
        python -c "
        import json, os
        cd = 'models/chunks'
        with open(f'{cd}/manifest.json') as f:
            m = json.load(f)
        wf = m['weights_filename']
        if not os.path.exists(f'{cd}/{wf}'):
            print(f'Reassembling {wf}...')
            with open(f'{cd}/{wf}', 'wb') as out:
                for cp in m['chunks']:
                    with open(cp, 'rb') as inc:
                        out.write(inc.read())
            print('Done')
        else:
            print(f'Already reassembled: {os.path.getsize(f\"{cd}/{wf}\")//1024//1024}MB')
        "
    - name: Generate response
      run: |
        python -c "
        from llama_cpp import Llama
        import json, time, os, glob
        
        # Find the model file
        cd = 'models/chunks'
        candidates = glob.glob(f'{cd}/*.bin') + glob.glob(f'{cd}/*.safetensors')
        # Filter to the reassembled weights file
        model_path = None
        for c in candidates:
            name = os.path.basename(c)
            if name.startswith('model_chunk'): continue
            if name in ['pytorch_model.bin', 'model.safetensors']:
                model_path = c
                break
        if not model_path:
            # Try manifest
            with open(f'{cd}/manifest.json') as f:
                m = json.load(f)
            model_path = f'{cd}/{m[\"weights_filename\"]}'
        
        print(f'Loading: {model_path}')
        llm = Llama(model_path=model_path, n_ctx=256, n_threads=2, verbose=False)
        q = '''${{ github.event.inputs.question }}'''
        out = llm(f'Question: {q}\n\nAnswer:', max_tokens=60, temperature=0.8)
        resp = out['choices'][0]['text'].strip()
        with open('response.json','w') as f:
            json.dump({'question':q,'response':resp,'time':time.time()}, f)
        print(resp)
        "
    - name: Push response
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        git add response.json
        if git diff --staged --quiet; then
          echo "No changes"
        else
          git commit -m "💬 Response"
          git push origin main
          echo "Pushed!"
        fi
