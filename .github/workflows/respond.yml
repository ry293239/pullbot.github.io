name: Respond

on:
  workflow_dispatch:
    inputs:
      question:
        description: 'Question'
        required: true

jobs:
  respond:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-llama
        
    - name: Install deps
      run: pip install llama-cpp-python
      
    - name: Generate response
      run: |
        python -c "
        from llama_cpp import Llama
        import json, time
        print('Loading model...')
        llm = Llama(model_path='models/pullbot.gguf', n_ctx=256, n_threads=2, verbose=False)
        question = '''${{ github.event.inputs.question }}'''
        print(f'Q: {question}')
        output = llm(f'Question: {question}\n\nAnswer:', max_tokens=60, temperature=0.8, top_p=0.9)
        response = output['choices'][0]['text'].strip()
        print(f'A: {response}')
        result = {
            'question': question,
            'response': response,
            'timestamp': time.time(),
            'id': str(int(time.time() * 1000))
        }
        with open('response.json', 'w') as f:
            json.dump(result, f)
        print('Saved!')
        "
    - name: Push response
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        git add response.json
        git diff --staged --quiet || git commit -m "💬 Response $(date +%s)"
        git pull --rebase origin main
        git push origin main
        echo "Pushed! Response should be live in 5 seconds."
