name: Train Pullbot

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Ping Pullbot"]
    types: [completed]

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Resolve conflicts
      run: |
        git checkout --ours data/processed/corpus.txt 2>/dev/null || true
        git checkout --ours knowledge/store.json 2>/dev/null || true
        git checkout --ours data/knowledge/version.json 2>/dev/null || true
        git add -A
        git diff --staged --quiet || git commit -m "Auto-resolve conflicts" || true
        
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install torch transformers datasets accelerate requests beautifulsoup4 numpy pyyaml safetensors
        
    - name: Scrape web
      timeout-minutes: 5
      run: python src/scrape.py
      
    - name: Clean corpus
      run: python src/clean_corpus.py
      
    - name: Rich training data
      run: python src/rich_scraper.py
      
    - name: Smart training
      run: python src/smart_train.py
      
    - name: Generate synthetic Q&A (GitHub Models)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python src/generate_synthetic_qa.py gpt-4o 2>/dev/null || echo "Synthetic Q&A skipped"
      
    - name: Build knowledge store
      timeout-minutes: 10
      run: python src/store.py build
      
    - name: Train model
      id: training
      timeout-minutes: 310
      continue-on-error: true
      run: |
        if [ -f data/processed/corpus.txt ]; then
          CORPUS_SIZE=$(wc -c < data/processed/corpus.txt)
          echo "Corpus size: $CORPUS_SIZE chars"
          if [ "$CORPUS_SIZE" -gt 2000 ]; then
            LATEST=$(ls -d models/checkpoints/checkpoint-* 2>/dev/null | sort -V | tail -1)
            if [ -n "$LATEST" ]; then
              echo "Resuming from: $LATEST"
              python src/model.py train --resume "$LATEST"
            else
              echo "Starting fresh training..."
              python src/model.py train
            fi
            echo "TRAINED=true" >> $GITHUB_ENV
          else
            echo "Corpus too small"
            echo "TRAINED=false" >> $GITHUB_ENV
          fi
        else
          echo "No corpus found"
          echo "TRAINED=false" >> $GITHUB_ENV
        fi
      
    - name: Save training progress
      if: always()
      run: |
        if [ -d models/checkpoints ]; then
          LATEST=$(ls -d models/checkpoints/checkpoint-* 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            echo "Checkpoint found: $LATEST"
            echo "TRAINED=true" >> $GITHUB_ENV
          fi
        fi
      
    - name: Update version file
      if: always()
      run: |
        mkdir -p data/knowledge
        CHUNKS=0; CORPUS_KB=0
        
        if [ -f knowledge/store.json ]; then
          python -c "import json; json.load(open('knowledge/store.json'))" 2>/dev/null && CHUNKS=$(python -c "import json; print(len(json.load(open('knowledge/store.json'))))") || CHUNKS=0
        fi
        
        if [ -f data/processed/corpus.txt ]; then
          CORPUS_KB=$(( $(wc -c < data/processed/corpus.txt) / 1024 ))
        fi
        
        CURRENT="1.0"
        if [ -f data/knowledge/version.json ]; then
          python -c "import json; json.load(open('data/knowledge/version.json'))" 2>/dev/null && CURRENT=$(python -c "import json; print(json.load(open('data/knowledge/version.json'))['version'])") || CURRENT="1.0"
        fi
        
        MAJOR=$(echo $CURRENT | cut -d. -f1)
        MINOR=$(echo $CURRENT | cut -d. -f2)
        NEW_MINOR=$((MINOR + 1))
        NEW_VERSION="${MAJOR}.${NEW_MINOR}"
        
        cat > data/knowledge/version.json << ENDJSON
        {
          "version": "${NEW_VERSION}",
          "updated": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
          "knowledge_chunks": ${CHUNKS},
          "corpus_kb": ${CORPUS_KB},
          "model_trained": $( [ "$TRAINED" = "true" ] && echo "true" || echo "false" ),
          "training_type": "full_fine_tune"
        }
        ENDJSON
        echo "Version: ${NEW_VERSION}"
        echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_ENV
        
    - name: Remove large files before push
      if: always()
      run: |
        rm -rf models/temp_trained/
        rm -rf models/temp_quick/
        rm -f models/chunks/model.safetensors
        rm -f models/chunks/pytorch_model.bin
        
    - name: Commit and push
      if: always()
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        git checkout --ours data/processed/corpus.txt 2>/dev/null || true
        git checkout --ours knowledge/store.json 2>/dev/null || true
        git checkout --ours data/knowledge/version.json 2>/dev/null || true
        git stash
        git pull --rebase origin main
        git stash pop || true
        git add data/ knowledge/ models/chunks/ models/checkpoints/ models/last_train.json 2>/dev/null || true
        git add src/ config.yaml requirements.txt .github/ js/ index.html .gitignore 2>/dev/null || true
        git add data/knowledge/version.json 2>/dev/null || true
        if git diff --staged --quiet; then
          echo "No changes"
        else
          git commit -m "v${NEW_VERSION}: $(date -u +'%Y-%m-%d %H:%M UTC') | ${CHUNKS} chunks | ${CORPUS_KB}KB corpus"
          git push origin main
        fi
