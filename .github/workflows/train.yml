name: Train Pullbot

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Ping Pullbot"]
    types: [completed]

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    
    steps:
    - uses: actions/checkout@v4
      
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install torch transformers datasets accelerate requests beautifulsoup4 numpy pyyaml
        
    - name: Scrape web
      run: python src/scrape.py
      
    - name: Clean corpus
      run: python src/clean_corpus.py
      
    - name: Build knowledge store
      run: python src/store.py build
      
    - name: Train model
      run: |
        if [ -f data/processed/corpus.txt ]; then
          CORPUS_SIZE=$(wc -c < data/processed/corpus.txt)
          echo "Corpus size: $CORPUS_SIZE chars"
          if [ "$CORPUS_SIZE" -gt 2000 ]; then
            LATEST=$(ls -d models/checkpoints/checkpoint-* 2>/dev/null | sort -V | tail -1)
            if [ -n "$LATEST" ]; then
              echo "Resuming from: $LATEST"
              python src/model.py train --resume "$LATEST"
            else
              echo "Starting fresh training..."
              python src/model.py train
            fi
            echo "TRAINED=true" >> $GITHUB_ENV
          else
            echo "Corpus too small"
            echo "TRAINED=false" >> $GITHUB_ENV
          fi
        else
          echo "No corpus found"
          echo "TRAINED=false" >> $GITHUB_ENV
        fi
      
    - name: Update version file
      run: |
        mkdir -p data/knowledge
        CHUNKS=0
        CORPUS_KB=0
        if [ -f knowledge/store.json ]; then
          CHUNKS=$(python -c "import json; print(len(json.load(open('knowledge/store.json'))))")
        fi
        if [ -f data/processed/corpus.txt ]; then
          CORPUS_KB=$(( $(wc -c < data/processed/corpus.txt) / 1024 ))
        fi
        if [ -f data/knowledge/version.json ]; then
          CURRENT=$(python -c "import json; print(json.load(open('data/knowledge/version.json'))['version'])")
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="${MAJOR}.${NEW_MINOR}"
        else
          NEW_VERSION="1.1"
        fi
        cat > data/knowledge/version.json << ENDJSON
        {
          "version": "${NEW_VERSION}",
          "updated": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
          "knowledge_chunks": ${CHUNKS},
          "corpus_kb": ${CORPUS_KB},
          "model_trained": $( [ "$TRAINED" = "true" ] && echo "true" || echo "false" ),
          "training_type": "full_fine_tune"
        }
        ENDJSON
        echo "Version: ${NEW_VERSION}"
        echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_ENV
        
    - name: Remove large files before push
      run: |
        rm -rf models/checkpoints/
        rm -rf models/temp_trained/
        rm -rf models/temp_quick/
        rm -f models/chunks/model.safetensors
        rm -f models/chunks/pytorch_model.bin
        
    - name: Commit and push
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        git add data/ knowledge/ models/chunks/ models/last_train.json 2>/dev/null || true
        git add src/ config.yaml requirements.txt .github/ js/ index.html .gitignore 2>/dev/null || true
        git add data/knowledge/version.json 2>/dev/null || true
        if git diff --staged --quiet; then
          echo "No changes"
        else
          git commit -m "v${NEW_VERSION}: $(date -u +'%Y-%m-%d %H:%M UTC') | ${CHUNKS} chunks | ${CORPUS_KB}KB corpus"
          for i in 1 2 3; do
            git pull --rebase && git push && break
            sleep 5
          done
        fi
