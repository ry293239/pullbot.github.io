name: Pullbot Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    
    steps:
    - uses: actions/checkout@v4
      
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Cache models
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: hf-models-${{ runner.os }}-${{ hashFiles('config.yaml') }}
        
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install torch transformers peft accelerate requests beautifulsoup4 numpy pyyaml datasets
        
    - name: Scrape
      run: python src/scrape.py
      
    - name: Build knowledge
      run: python src/store.py build
      
    - name: Commit & push
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        git add -A
        git diff --staged --quiet || git commit -m "🤖 Auto-update: $(date -u +'%Y-%m-%d %H:%M UTC')"
        git pull --rebase
        git push
        
    - name: Deploy
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        publish_branch: gh-pages
        keep_files: true
