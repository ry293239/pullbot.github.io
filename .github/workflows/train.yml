name: Train Pullbot

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Ping Pullbot"]
    types: [completed]

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    
    steps:
    - uses: actions/checkout@v4
      
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install torch transformers peft accelerate requests beautifulsoup4 numpy pyyaml datasets
        
    - name: 📊 Scrape
      run: python src/scrape.py
      
    - name: 🧠 Build knowledge
      run: python src/store.py build
      
    - name: 🚀 Train
      run: python src/model.py train
      
    - name: 💾 Commit & push
      run: |
        git config user.name "Pullbot"
        git config user.email "pullbot@bot.dev"
        git add -A
        git diff --staged --quiet || git commit -m "🤖 Trained: $(date -u +'%Y-%m-%d %H:%M UTC')"
        git pull --rebase
        git push
        
    - name: 🌐 Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        publish_branch: gh-pages
        force_orphan: true
        enable_jekyll: false
