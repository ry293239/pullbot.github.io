name: Poll 1

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Poll 2"]
    types: [completed]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: write
      contents: read
    steps:
    - uses: actions/checkout@v4
    - name: Check for pending question
      run: |
        if [ -f pending.json ]; then
          QUESTION=$(python3 -c "import json; d=json.load(open('pending.json')); print(d.get('question',''))")
          if [ -n "$QUESTION" ] && [ "$QUESTION" != "" ]; then
            echo "Found: $QUESTION"
            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/poll2.yml/dispatches" \
              -d "{\"ref\":\"main\",\"inputs\":{\"question\":\"$QUESTION\"}}"
            echo "Poll 2 triggered!"
            exit 0
          fi
        fi
        echo "No question. Waiting 20min then triggering Poll 2..."
        sleep 1200
        curl -s -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${{ github.repository }}/actions/workflows/poll2.yml/dispatches" \
          -d '{"ref":"main","inputs":{"question":"cycle"}}'
        echo "Cycle trigger sent to Poll 2"
