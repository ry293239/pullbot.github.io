name: Watchdog Alpha

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    
    steps:
    - name: Check all Pullbot workflows
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "🔍 WATCHDOG ALPHA - $(date)"
        echo "=========================================="
        
        # Define all workflows to monitor
        WORKFLOWS="train.yml mass-scrape.yml quick-train.yml optimise.yml ping.yml mass-scrape-ping.yml quick-train-ping.yml"
        
        for WF in $WORKFLOWS; do
          WF_NAME=$(echo $WF | sed 's/.yml//' | tr '-' ' ')
          
          # Get latest run
          RESULT=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/pullbot-ai/pullbot-ai.github.io/actions/workflows/$WF/runs?per_page=1" 2>/dev/null)
          
          if [ -z "$RESULT" ]; then
            echo "❌ $WF_NAME: no data"
            continue
          fi
          
          STATUS=$(echo "$RESULT" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              runs = data.get('workflow_runs', [])
              if runs:
                  r = runs[0]
                  print(f\"{r.get('status','?')}|{r.get('conclusion','?')}|{r.get('created_at','?')}\")
              else:
                  print('no_runs')
          except:
              print('error')
          " 2>/dev/null || echo "error")
          
          if [ "$STATUS" = "no_runs" ]; then
            echo "⚠️  $WF_NAME: Never run!"
          elif [ "$STATUS" = "error" ]; then
            echo "⚠️  $WF_NAME: API error"
          else
            WF_STATUS=$(echo $STATUS | cut -d'|' -f1)
            WF_CONCLUSION=$(echo $STATUS | cut -d'|' -f2)
            WF_TIME=$(echo $STATUS | cut -d'|' -f3)
            
            case "$WF_CONCLUSION" in
              "success")
                echo "✅ $WF_NAME: OK (last: $WF_TIME)"
                ;;
              "failure")
                echo "❌ $WF_NAME: FAILED (last: $WF_TIME)"
                ;;
              "cancelled")
                echo "⚠️  $WF_NAME: Cancelled (last: $WF_TIME)"
                ;;
              *)
                echo "🔄 $WF_NAME: $WF_STATUS ($WF_CONCLUSION)"
                ;;
            esac
          fi
        done
        
        echo "=========================================="
        echo "✅ Watchdog Alpha complete"
