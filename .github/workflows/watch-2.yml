name: Watchdog Beta

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'
  workflow_run:
    workflows: ["Watchdog Alpha"]
    types: [completed]

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: pip install requests
    - name: Run watchdog
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python src/watchdog.py
