name: Watchdog Beta

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'
  workflow_run:
    workflows: ["Watchdog Alpha"]
    types: [completed]

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - name: Check and revive workflows
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "🔍 WATCHDOG BETA - $(date)"
        echo "=========================================="
        
        # Workflows to monitor with their ping counterparts
        # Format: "workflow_file:ping_workflow:description"
        WORKFLOWS="train.yml:Ping Pullbot:Train,mass-scrape.yml:Mass Scrape Ping:Mass Scrape,quick-train.yml:Quick Train Ping:Quick Train"
        
        for ENTRY in $WORKFLOWS; do
          WF=$(echo $ENTRY | cut -d: -f1)
          PING=$(echo $ENTRY | cut -d: -f2)
          DESC=$(echo $ENTRY | cut -d: -f3)
          
          # Check last 3 runs
          RESULT=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/pullbot-ai/pullbot-ai.github.io/actions/workflows/$WF/runs?per_page=3" 2>/dev/null)
          
          LAST_STATUS=$(echo "$RESULT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          runs = data.get('workflow_runs', [])
          statuses = [r.get('status') for r in runs]
          # Check if any are running or queued
          if 'in_progress' in statuses or 'queued' in statuses:
              print('active')
          elif runs and runs[0].get('conclusion') == 'success':
              print('healthy')
          else:
              print('dead')
          " 2>/dev/null || echo "error")
          
          echo "   $DESC: $LAST_STATUS"
          
          # If dead, trigger the ping to revive it
          if [ "$LAST_STATUS" = "dead" ]; then
            echo "   ⚡ Reviving $DESC..."
            
            PING_FILE=$(echo "$PING" | tr ' ' '-' | tr '[:upper:]' '[:lower:]')
            
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/pullbot-ai/pullbot-ai.github.io/actions/workflows/$PING_FILE.yml/dispatches" \
              -d "{\"ref\":\"main\"}" 2>/dev/null
            
            echo "   ✅ Ping sent to $PING"
            echo "   ⏰ $DESC should start within seconds"
          fi
        done
        
        # Also check Optimize
        echo ""
        echo "   Checking Optimize..."
        OPT_RESULT=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
          "https://api.github.com/repos/pullbot-ai/pullbot-ai.github.io/actions/workflows/optimise.yml/runs?per_page=3" 2>/dev/null)
        
        OPT_STATUS=$(echo "$OPT_RESULT" | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        runs = data.get('workflow_runs', [])
        statuses = [r.get('status') for r in runs]
        if 'in_progress' in statuses or 'queued' in statuses:
            print('active')
        elif runs:
            print('ok')
        else:
            print('dead')
        " 2>/dev/null || echo "error")
        
        echo "   Optimize: $OPT_STATUS"
        
        echo "=========================================="
        echo "✅ Watchdog Beta complete"
