# ============================================
# PULLBOT CONFIGURATION
# ============================================

model:
  type: "tiny"
  base: "distilgpt2"
  max_length: 256
  temperature: 0.8
  embed_dim: 128
  hidden_dim: 256
  num_layers: 4

training:
  chunk_minutes: 280
  learning_rate: 0.001
  batch_size: 8
  max_examples: 5000
  epochs: 1

scrape:
  sources:
    - github_trending
    - wikipedia_random
  github_readmes: 5
  wikipedia_articles: 10
  max_chars: 500000

knowledge:
  chunk_size: 300
  top_k: 3
  max_chunks: 5000
  embed_dim: 128

evolve:
  enabled: false
  variants: 20
  keep_percent: 10
  min_length: 20

personality:
  intro: "Hey! I'm Pullbot. I scrape the web to learn. Ask me anything!"
  style: "concise"
  max_response_len: 200

repo:
  data_dir: "data"
  model_dir: "models"
  knowledge_dir: "knowledge"
