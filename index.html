<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pullbot - AI That Pulls From The Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 100%;
            max-width: 700px;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #8b949e;
        }
        
        .chat-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            text-align: right;
        }
        
        .message.user .bubble {
            background: #238636;
            display: inline-block;
            padding: 10px 15px;
            border-radius: 18px 18px 4px 18px;
            max-width: 80%;
            word-wrap: break-word;
        }
        
        .message.bot .bubble {
            background: #21262d;
            display: inline-block;
            padding: 10px 15px;
            border-radius: 18px 18px 18px 4px;
            max-width: 80%;
            word-wrap: break-word;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
        }
        
        #userInput {
            flex: 1;
            padding: 12px 18px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 24px;
            color: #c9d1d9;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        #userInput:focus {
            border-color: #58a6ff;
        }
        
        #sendBtn {
            padding: 12px 24px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        
        #sendBtn:hover {
            background: #2ea043;
        }
        
        #sendBtn:disabled {
            background: #21262d;
            cursor: not-allowed;
        }
        
        .status {
            text-align: center;
            margin-top: 10px;
            color: #8b949e;
            font-size: 0.9em;
        }
        
        .typing-indicator {
            display: none;
            padding: 10px 15px;
        }
        
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8b949e;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Pullbot</h1>
            <p>AI that pulls knowledge from the web</p>
        </div>
        
        <div class="chat-box" id="chatBox">
            <div class="message bot">
                <div class="bubble">
                    Hey! I'm Pullbot. I scrape GitHub and Wikipedia to learn new things. 
                    Ask me anything — I'm continuously improving!
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <input 
                type="text" 
                id="userInput" 
                placeholder="Ask Pullbot something..."
                autocomplete="off"
            >
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
        
        <div class="status" id="status">
            🟢 Pullbot is learning from the web every 6 hours
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
        
        function addMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            
            // Add user message
            addMessage(text, 'user');
            userInput.value = '';
            sendBtn.disabled = true;
            
            // Show typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot typing-indicator';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            typingDiv.style.display = 'block';
            chatBox.appendChild(typingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            try {
                // In the real deployment, this would call a serverless function
                // For GitHub Pages, we simulate with a delayed response
                // You can replace this with an actual API endpoint later
                
                await new Promise(resolve => setTimeout(resolve, 1500 + Math.random() * 2000));
                
                const responses = [
                    "That's a great question! Based on what I've learned from GitHub and Wikipedia, " +
                    "I can tell you that this topic involves several interesting aspects. " +
                    "The open source community has been actively working on related projects.",
                    
                    "I've scraped quite a bit about this! From trending repositories, " +
                    "developers are building innovative solutions. Wikipedia articles provide " +
                    "solid foundational knowledge on the subject.",
                    
                    "Let me pull from my knowledge base... I've indexed information from " +
                    "multiple sources. The key insight is that this is an evolving field " +
                    "with contributions from developers worldwide.",
                ];
                
                const response = responses[Math.floor(Math.random() * responses.length)];
                
                // Remove typing indicator
                typingDiv.remove();
                
                // Add bot response
                addMessage(response, 'bot');
                
            } catch (error) {
                typingDiv.remove();
                addMessage("Sorry, I'm having trouble connecting to my knowledge base. Try again later!", 'bot');
            }
            
            sendBtn.disabled = false;
        }
        
        // Add initial greeting animation
        setTimeout(() => {
            document.querySelector('.header h1').style.opacity = '1';
        }, 100);
    </script>
</body>
</html>
