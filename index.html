<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pullbot - AI That Learns From The Web</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta property="og:image" content="https://pullbot-ai.github.io/icon.png">
    <style>
        :root {
            --bg-primary: #0D1A16;
            --bg-sidebar: #081210;
            --bg-chat: #0D1A16;
            --bg-input: #152A23;
            --bg-bubble-bot: #1A3329;
            --bg-bubble-user: #0D1A16;
            --text-primary: #E8F0EC;
            --text-secondary: #8AA89A;
            --accent: #2DD4A8;
            --accent-glow: #1DB88A;
            --accent-hover: #3BE0B4;
            --border: #1F3D30;
            --cyan: #4EE6C7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100dvh;
            display: flex;
            overflow: hidden;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
        }

        /* ========== LOADING SCREEN ========== */
        #loadingScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-primary);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease;
        }
        #loadingScreen.hidden { opacity: 0; pointer-events: none; }
        .loader-icon {
            width: 80px; height: 80px; margin-bottom: 24px;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(45, 212, 168, 0.4);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.85; }
        }
        .loader-title {
            font-size: 28px; font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .loader-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }
        .loader-bar { width: 200px; height: 3px; background: var(--bg-input); border-radius: 2px; overflow: hidden; }
        .loader-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--cyan)); border-radius: 2px; transition: width 0.4s ease; width: 0%; }
        .loader-status { font-size: 12px; color: var(--text-secondary); margin-top: 12px; }

        /* ========== SIDEBAR ========== */
        #sidebar {
            width: 260px; min-width: 260px;
            background: var(--bg-sidebar);
            display: flex; flex-direction: column; flex-shrink: 0;
            border-right: 1px solid var(--border);
            height: 100%;
        }
        .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
        .sidebar-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .sidebar-logo img { width: 32px; height: 32px; border-radius: 50%; }
        .sidebar-logo span {
            font-weight: 700; font-size: 18px;
            background: linear-gradient(135deg, var(--accent), var(--cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .new-chat-btn {
            width: 100%; padding: 10px; background: transparent;
            color: var(--accent); border: 1px solid var(--border);
            border-radius: 8px; cursor: pointer; font-size: 13px;
            transition: all 0.2s;
        }
        .new-chat-btn:hover { background: rgba(45, 212, 168, 0.08); border-color: var(--accent); }
        .sidebar-section { padding: 14px 16px 6px; font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .chat-list { flex: 1; overflow-y: auto; padding: 0 8px; }
        .chat-list-item {
            padding: 10px 12px; border-radius: 8px; cursor: pointer;
            font-size: 13px; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; transition: background 0.2s; margin-bottom: 2px;
        }
        .chat-list-item:hover { background: var(--bg-input); }
        .chat-list-item.active { background: rgba(45, 212, 168, 0.1); }
        .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); }
        .sidebar-btn {
            width: 100%; padding: 9px 12px; background: transparent;
            color: var(--text-secondary); border: none; border-radius: 8px;
            cursor: pointer; font-size: 13px; text-align: left;
            transition: all 0.2s; margin-bottom: 4px;
        }
        .sidebar-btn:hover { background: var(--bg-input); color: var(--text-primary); }
        .sidebar-btn.accent { color: var(--accent); }

        /* ========== MAIN ========== */
        #main {
            flex: 1; display: flex; flex-direction: column;
            min-width: 0; height: 100%; overflow: hidden;
        }
        .top-bar {
            padding: 12px 20px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border);
            background: var(--bg-primary); flex-shrink: 0;
        }
        .hamburger { background: none; border: none; color: var(--text-secondary); font-size: 20px; cursor: pointer; }
        .hamburger:hover { color: var(--text-primary); }
        .top-bar-title { display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .top-bar-title img { width: 24px; height: 24px; border-radius: 50%; }
        .login-btn {
            padding: 8px 16px; background: var(--accent); color: var(--bg-primary);
            border: none; border-radius: 8px; cursor: pointer;
            font-size: 13px; font-weight: 600; transition: all 0.2s;
        }
        .login-btn:hover { background: var(--accent-hover); box-shadow: 0 0 20px rgba(45, 212, 168, 0.3); }
        .chat-container {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .welcome-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; }
        .welcome-screen.hidden { display: none; }
        .welcome-icon { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 24px; box-shadow: 0 0 30px rgba(45, 212, 168, 0.5); }
        .welcome-title { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
        .welcome-subtitle { font-size: 15px; color: var(--text-secondary); margin-bottom: 32px; }
        .suggestion-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 600px; }
        .suggestion-card {
            padding: 16px; background: var(--bg-bubble-bot);
            border: 1px solid var(--border); border-radius: 12px;
            cursor: pointer; transition: all 0.2s; font-size: 13px; text-align: left;
        }
        .suggestion-card:hover { border-color: var(--accent); background: rgba(45, 212, 168, 0.05); }
        .messages-container { width: 100%; max-width: 768px; margin: 0 auto; }
        .message { display: flex; padding: 20px 0; gap: 16px; }
        .message-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0; background: var(--bg-input);
            overflow: hidden;
        }
        .message-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .message-avatar.bot { background: linear-gradient(135deg, rgba(45, 212, 168, 0.2), rgba(78, 230, 199, 0.1)); }
        .message-content { line-height: 1.6; font-size: 14px; white-space: pre-wrap; word-wrap: break-word; }

        /* ========== INPUT ========== */
        .input-container {
            padding: 12px 16px; max-width: 768px;
            margin: 0 auto; width: 100%; flex-shrink: 0;
        }
        .input-wrapper {
            display: flex; gap: 10px; background: var(--bg-input);
            border-radius: 14px; padding: 6px 6px 6px 18px;
            border: 1px solid var(--border); transition: border-color 0.2s;
        }
        .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 20px rgba(45, 212, 168, 0.1); }
        .input-wrapper input {
            flex: 1; background: none; border: none; color: var(--text-primary);
            font-size: 14px; outline: none; padding: 8px 0;
        }
        .input-wrapper input::placeholder { color: var(--text-secondary); }
        .send-btn {
            background: var(--accent); border: none; color: var(--bg-primary);
            width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
            font-size: 18px; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .send-btn:hover { background: var(--accent-hover); box-shadow: 0 0 15px rgba(45, 212, 168, 0.4); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .input-footer { text-align: center; font-size: 11px; color: var(--text-secondary); margin-top: 8px; }
        .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; }
        .status-dot.online { background: var(--accent); }
        .status-dot.offline { background: #EF4444; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .toast {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--accent); color: var(--bg-primary);
            padding: 12px 20px; border-radius: 10px; font-size: 13px;
            font-weight: 600; z-index: 2000;
            transform: translateY(100px); opacity: 0;
            transition: all 0.3s ease;
        }
        .toast.show { transform: translateY(0); opacity: 1; }

        @media (max-width: 768px) {
            #sidebar { position: fixed; left: -280px; top: 0; bottom: 0; z-index: 100; transition: left 0.3s ease; }
            #sidebar.open { left: 0; }
            .suggestion-grid { grid-template-columns: 1fr; }
            .welcome-title { font-size: 24px; }
        }
    </style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen">
    <img src="icon.png" alt="Pullbot" class="loader-icon" onerror="this.style.display='none'">
    <div class="loader-title">Pullbot</div>
    <div class="loader-subtitle">AI That Learns From The Web</div>
    <div class="loader-bar"><div class="loader-bar-fill" id="loaderFill"></div></div>
    <div class="loader-status" id="loaderStatus">Connecting to Pullbot API...</div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <img src="icon.png" alt="Pullbot" onerror="this.style.display='none'">
            <span>Pullbot</span>
        </div>
        <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
    </div>
    <div class="sidebar-section">History</div>
    <div class="chat-list" id="chatList"></div>
    <div class="sidebar-footer">
        <button class="sidebar-btn" onclick="showToast('Settings coming soon')">Settings</button>
        <button class="sidebar-btn accent" onclick="checkAPIStatus()">Check Status</button>
        <button class="sidebar-btn" onclick="window.open('https://github.com/pullbot-ai/pullbot-ai.github.io','_blank')">View on GitHub</button>
    </div>
</div>

<!-- MAIN -->
<div id="main">
    <div class="top-bar">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <span class="top-bar-title"><img src="icon.png" alt="" onerror="this.style.display='none'">Pullbot</span>
        <button class="login-btn" onclick="showToast('Login coming soon')">Log In</button>
    </div>
    <div class="chat-container" id="chatContainer">
        <div class="welcome-screen" id="welcomeScreen">
            <img src="icon.png" alt="Pullbot" class="welcome-icon" onerror="this.style.display='none'">
            <div class="welcome-title">How can I help?</div>
            <div class="welcome-subtitle">I learn from Wikipedia and dictionaries to build my vocabulary</div>
            <div class="suggestion-grid">
                <div class="suggestion-card" onclick="sendSuggestion('What is an algorithm?')">"What is an algorithm?"</div>
                <div class="suggestion-card" onclick="sendSuggestion('Explain how computers work')">"Explain how computers work"</div>
                <div class="suggestion-card" onclick="sendSuggestion('What is 15 * 7?')">"What is 15 * 7?"</div>
                <div class="suggestion-card" onclick="sendSuggestion('Tell me about machine learning')">"Tell me about machine learning"</div>
            </div>
        </div>
        <div class="messages-container" id="messagesContainer"></div>
    </div>
    <div class="input-container">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Ask Pullbot anything..." onkeypress="handleKeyPress(event)" autocomplete="off">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">↗</button>
        </div>
        <div class="input-footer" id="statusFooter"><span class="status-dot" id="statusDot"></span>Checking API...</div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://pullbot-api.onrender.com';
let apiOnline = false;
let chats = {};
let currentChatId = null;

function updateLoader(text, percent) {
    document.getElementById('loaderStatus').textContent = text;
    document.getElementById('loaderFill').style.width = percent + '%';
}

async function init() {
    updateLoader('Connecting to Pullbot API...', 20);
    await checkAPIStatus();
    updateLoader('Ready!', 100);
    await new Promise(r => setTimeout(r, 500));
    document.getElementById('loadingScreen').classList.add('hidden');
}

async function checkAPIStatus() {
    try {
        const r = await fetch(`${API_URL}/health`);
        if (r.ok) { apiOnline = true; }
    } catch(e) { apiOnline = false; }
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot ' + (apiOnline ? 'online' : 'offline');
    document.getElementById('statusFooter').innerHTML = '<span class="status-dot ' + (apiOnline ? 'online' : 'offline') + '"></span>' + (apiOnline ? 'Pullbot API Online' : 'Pullbot API Offline');
}

async function askPullbot(question) {
    if (apiOnline) {
        try {
            const r = await fetch(`${API_URL}/ask?q=${encodeURIComponent(question)}`);
            if (r.ok) {
                const data = await r.json();
                return data.response || "I couldn't process that.";
            }
        } catch(e) { apiOnline = false; }
    }
    return getLocalResponse(question);
}

function getLocalResponse(prompt) {
    const q = prompt.toLowerCase().trim();
    const mathMatch = q.match(/(\d+\.?\d*)\s*([+\-*\/])\s*(\d+\.?\d*)/);
    if (mathMatch) {
        const a = parseFloat(mathMatch[1]), b = parseFloat(mathMatch[3]);
        let r;
        switch(mathMatch[2]) {
            case '+': r = a + b; break;
            case '-': r = a - b; break;
            case '*': r = a * b; break;
            case '/': r = b !== 0 ? a / b : 'undefined'; break;
        }
        return `${a} ${mathMatch[2]} ${b} = ${r}`;
    }
    if (q.match(/^(hi|hello|hey|yo|sup)\b/)) return "Hey there! I'm Pullbot. What can I help with?";
    if (q.includes('your name') || q.includes('who are you')) return "I'm Pullbot! I learn from Wikipedia and build my vocabulary every day.";
    if (q.match(/^(thanks|thank you|thx|ty)\b/)) return "You're welcome!";
    if (q.match(/^(bye|goodbye|see you|cya)\b/)) return "See you! Come back anytime.";
    return "I'm thinking... try asking me something else!";
}

function newChat() {
    const id = 'chat_' + Date.now();
    chats[id] = { title: 'New Chat', messages: [], created: Date.now() };
    currentChatId = id;
    renderChatList(); renderMessages();
    document.getElementById('welcomeScreen').classList.add('hidden');
    document.getElementById('userInput').focus();
}

function switchChat(id) { currentChatId = id; renderChatList(); renderMessages(); }

function renderChatList() {
    const container = document.getElementById('chatList');
    const ids = Object.keys(chats).sort((a,b) => chats[b].created - chats[a].created);
    container.innerHTML = ids.map(id => {
        const chat = chats[id];
        return `<div class="chat-list-item${id === currentChatId ? ' active' : ''}" onclick="switchChat('${id}')">${escapeHtml(chat.title || 'New Chat')}</div>`;
    }).join('');
}

function renderMessages() {
    const container = document.getElementById('messagesContainer');
    const welcome = document.getElementById('welcomeScreen');
    if (!currentChatId || !chats[currentChatId] || chats[currentChatId].messages.length === 0) {
        container.innerHTML = '';
        welcome.classList.remove('hidden');
        return;
    }
    welcome.classList.add('hidden');
    container.innerHTML = chats[currentChatId].messages.map(msg => {
        const isUser = msg.role === 'user';
        const avatar = isUser ? '👤' : '<img src="icon.png" alt="Pullbot" onerror="this.parentElement.textContent=\'🤖\'">';
        return `<div class="message"><div class="message-avatar${isUser ? '' : ' bot'}">${avatar}</div><div class="message-content">${escapeHtml(msg.content)}</div></div>`;
    }).join('');
    setTimeout(() => { document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight; }, 100);
}

async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    if (!currentChatId) newChat();
    chats[currentChatId].messages.push({ role: 'user', content: text });
    if (chats[currentChatId].messages.length === 1) chats[currentChatId].title = text.substring(0, 40);
    input.value = '';
    renderMessages(); renderChatList();
    chats[currentChatId].messages.push({ role: 'assistant', content: 'Thinking...' });
    renderMessages();
    const response = await askPullbot(text);
    chats[currentChatId].messages[chats[currentChatId].messages.length - 1].content = response;
    renderMessages();
}

function sendSuggestion(text) { document.getElementById('userInput').value = text; sendMessage(); }
function handleKeyPress(event) { if (event.key === 'Enter') sendMessage(); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.style.transform = 'translateY(0)'; toast.style.opacity = '1';
    setTimeout(() => { toast.style.transform = 'translateY(100px)'; toast.style.opacity = '0'; }, 2500);
}
function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
